<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: white;
        }

        .clock {
            width: 300px;
            height: 300px;
            border: 10px solid #333;
            border-radius: 50%;
            position: relative;
            background-color: white;
        }

        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            transform: translateY(-3px);
        }

        .hand {
            width: 50%;
            height: 6px;
            background: black;
            position: absolute;
            top: 50%;
            transform-origin: 100%;
            transform: rotate(90deg);
            transition-timing-function: cubic-bezier(0.1, 2.7, 0.58, 1);
        }

        .hour-hand {
            height: 8px;
            left: 0;
        }

        .minute-hand {
            height: 6px;
            left: 0;
        }

        .second-hand {
            height: 2px;
            background: red;
            left: 0;
        }

        .center-circle {
            width: 12px;
            height: 12px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .number {
            position: absolute;
            font-size: 20px;
            font-family: Arial, sans-serif;
            color: black;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="clock-face">
            <div class="hand hour-hand"></div>
            <div class="hand minute-hand"></div>
            <div class="hand second-hand"></div>
            <div class="center-circle"></div>
            <!-- Numbers -->
            <div class="number" style="top: 10px; left: 50%; transform: translateX(-50%);">12</div>
            <div class="number" style="top: 50%; right: 10px; transform: translateY(-50%);">3</div>
            <div class="number" style="bottom: 10px; left: 50%; transform: translateX(-50%);">6</div>
            <div class="number" style="top: 50%; left: 10px; transform: translateY(-50%);">9</div>
            <div class="number" style="top: 25px; right: 40px;">1</div>
            <div class="number" style="top: 40px; right: 25px;">2</div>
            <div class="number" style="bottom: 40px; right: 25px;">4</div>
            <div class="number" style="bottom: 25px; right: 40px;">5</div>
            <div class="number" style="bottom: 25px; left: 40px;">7</div>
            <div class="number" style="bottom: 40px; left: 25px;">8</div>
            <div class="number" style="top: 40px; left: 25px;">10</div>
            <div class="number" style="top: 25px; left: 40px;">11</div>
        </div>
    </div>

    <script>
        const hourHand = document.querySelector('.hour-hand');
        const minuteHand = document.querySelector('.minute-hand');
        const secondHand = document.querySelector('.second-hand');

        function setDate() {
            const now = new Date();
            
            const seconds = now.getSeconds();
            const secondsDegrees = ((seconds / 60) * 360) + 90;
            secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
            
            const minutes = now.getMinutes();
            const minutesDegrees = ((minutes / 60) * 360) + ((seconds/60)*6) + 90;
            minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;
            
            const hours = now.getHours();
            const hoursDegrees = ((hours / 12) * 360) + ((minutes/60)*30) + 90;
            hourHand.style.transform = `rotate(${hoursDegrees}deg)`;
        }

        setInterval(setDate, 1000);
        setDate();
    </script>
</body>
</html>
